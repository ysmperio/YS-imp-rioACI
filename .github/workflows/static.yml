name: Deploy static HTML to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3️⃣ Upload de todo o site
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # envia todo o repositório (HTML, CSS, JS)

      # 4️⃣ Deploy
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # 5️⃣ Confirmar domínio personalizado (opcional)
      - name: Confirm custom domain
        run: |
          if [ -f ./CNAME ]; then
            echo "Custom domain detected: $(cat CNAME)"
          fi
